name: Weekly Backtest

on:
  schedule:
    - cron: "0 2 * * 0"   # Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest start date (YYYY-MM-DD). Defaults to 12 months ago. Use e.g. 2024-05-14 for a full 24-month run."
        required: false
        default: ""
      hit_rate_floor:
        description: "Minimum acceptable 6m hit rate (e.g. 0.45)"
        required: false
        default: "0.45"
      rebalance:
        description: "Rebalance frequency: weekly or monthly"
        required: false
        default: "weekly"
      enrich_screener:
        description: "Fill NULL ROCE/promoter from Screener.in after snapshot (true/false)"
        required: false
        default: "true"

jobs:
  backtest:
    name: Run backtest harness
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project dependencies
        run: pip install -e ".[neon]"

      - name: Compute start date
        id: dates
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            echo "start_date=${{ github.event.inputs.start_date }}" >> $GITHUB_OUTPUT
          else
            # 12-month default keeps weekly CI well within the 240-minute timeout.
            echo "start_date=$(date -d '12 months ago' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          echo "end_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Run backtest (snapshot → enrich → replay → score)
        id: backtest
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ENRICH_FLAG=""
          if [ "${{ github.event.inputs.enrich_screener || 'true' }}" = "true" ]; then
            ENRICH_FLAG="--enrich-screener"
          fi
          python -m backtest.run_backtest \
            --mode full \
            $ENRICH_FLAG \
            --start-date  ${{ steps.dates.outputs.start_date }} \
            --end-date    ${{ steps.dates.outputs.end_date }} \
            --rebalance   ${{ github.event.inputs.rebalance || 'weekly' }} \
            --hit-rate-floor ${{ github.event.inputs.hit_rate_floor || '0.45' }} \
            2>&1 | tee backtest_output.json
        continue-on-error: true   # We capture the exit code manually below.

      - name: Capture exit code
        id: result
        run: echo "exit_code=${{ steps.backtest.outcome == 'success' && '0' || '1' }}" >> $GITHUB_OUTPUT

      - name: Write summary markdown
        if: always()
        env:
          TIMESTAMP: ${{ steps.dates.outputs.timestamp }}
          END_DATE: ${{ steps.dates.outputs.end_date }}
          START_DATE: ${{ steps.dates.outputs.start_date }}
          OUTCOME: ${{ steps.backtest.outcome }}
        run: |
          mkdir -p backtest/results
          python - << 'PYEOF'
          import json, os, pathlib

          raw = pathlib.Path("backtest_output.json").read_text(errors="replace").splitlines()
          events = []
          for line in raw:
              line = line.strip()
              try:
                  obj = json.loads(line)
                  if "event" in obj:
                      events.append(obj)
              except (json.JSONDecodeError, ValueError):
                  pass

          def last_event(name):
              for e in reversed(events):
                  if e.get("event") == name:
                      return e
              return {}

          score   = last_event("SCORE_DONE")
          bands   = last_event("SCORE_BY_RANK_BAND")

          def fmt(v, suffix=""):
              return f"{v}{suffix}" if v is not None else "—"

          def pct(v):
              return f"{float(v)*100:.1f}%" if v is not None else "—"

          ts         = os.environ["TIMESTAMP"]
          end_date   = os.environ["END_DATE"]
          start_date = os.environ["START_DATE"]
          outcome    = os.environ["OUTCOME"]
          run_id     = score.get("run_id", "—")

          md = [
              f"# Backtest Summary — {end_date}",
              "",
              "| Field | Value |",
              "|-------|-------|",
              f"| Run date | {end_date} |",
              f"| Window | {start_date} → {end_date} |",
              f"| Run ID | `{run_id}` |",
              f"| Outcome | {outcome} |",
              "",
              "## Alpha model metrics (6-month window)",
              "",
              "| Metric | Value |",
              "|--------|-------|",
              f"| Recommendations (total) | {fmt(score.get('total_recommendations'))} |",
              f"| Buy recommendations | {fmt(score.get('buy_recommendations'))} |",
              f"| Hit rate 6m | {pct(score.get('hit_rate_6m'))} |",
              f"| Hit rate 3m | {pct(score.get('hit_rate_3m'))} |",
              f"| Alpha 6m (mean) | {fmt(score.get('alpha_6m'), '%')} |",
              f"| Alpha 6m (median) | {fmt(score.get('median_alpha_6m'), '%')} |",
              f"| Mean IC 6m | {fmt(score.get('mean_ic_6m'))} |",
              f"| IC t-stat | {fmt(score.get('ic_tstat'))} |",
              f"| ICIR | {fmt(score.get('icir'))} |",
              f"| Decile spread 6m | {fmt(score.get('decile_spread_6m'), '%')} |",
              "",
              "## By rank band",
              "",
              "| Band | Count | Hit rate 6m | Alpha 6m |",
              "|------|-------|-------------|----------|",
          ]
          for band, info in (bands.get("by_rank_band") or {}).items():
              md.append(
                  f"| {band} | {info.get('count','—')} "
                  f"| {pct(info.get('hit_rate_6m'))} "
                  f"| {fmt(info.get('alpha_6m'), '%')} |"
              )
          md += [
              "",
              "## Structured events",
              "",
              "```json",
          ]
          for e in events:
              md.append(json.dumps(e))
          md.append("```")

          pathlib.Path(f"backtest/results/backtest_{ts}.md").write_text("\n".join(md) + "\n")
          PYEOF

      - name: Commit summary markdown
        if: always()
        uses: EndBug/add-and-commit@v9
        with:
          add: "backtest/results/"
          message: "ci: backtest summary ${{ steps.dates.outputs.timestamp }}"
          default_author: github_actions

      - name: Fail job on hit-rate regression
        if: steps.backtest.outcome == 'failure'
        run: |
          echo "::error::Backtest hit rate fell below floor or run failed. Check backtest/results/ for details."
          exit 1
